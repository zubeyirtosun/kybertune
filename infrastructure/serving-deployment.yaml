apiVersion: apps/v1
kind: Deployment
metadata:
  name: kybertune-serving
  namespace: kybertune
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serving
  template:
    metadata:
      labels:
        app: serving
    spec:
      containers:
      - env:
        - name: RUN_ID
          value: 5a62f438ad534bc0afa4b5e3a2ee9ba3
        - name: MLFLOW_TRACKING_URI
          value: http://mlflow-service:5000
        image: kybertune-serving:latest
        name: serving
        ports:
        - containerPort: 8000
        resources:
          limits:
            nvidia.com/gpu: 1
---
apiVersion: v1
kind: Service
metadata:
  name: serving-service
  namespace: kybertune
spec:
  ports:
  - port: 8000
    protocol: TCP
    targetPort: 8000
  selector:
    app: serving
  type: LoadBalancer
