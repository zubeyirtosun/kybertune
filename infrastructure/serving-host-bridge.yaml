apiVersion: v1
kind: Service
metadata:
  name: serving-service
  namespace: kybertune
spec:
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: serving-service
  namespace: kybertune
subsets:
  - addresses:
      - ip: 172.18.0.1 # Kind cluster'ından ana makineye erişim IP'si
    ports:
      - port: 8000
